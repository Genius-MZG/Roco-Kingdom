async function addRecord(e){e.preventDefault();const p=petMap.get(els.recordPetSelect.value),s=seasonMap.get(els.recordSeasonSelect.value);if(!p||!s||p.seasonId!==s.id){setRecordStatus('请选择有效的赛季和异色精灵。',true);return}const record={id:cryptoRandomId(),petId:p.id,petName:p.name,seasonId:s.id,obtainedDate:normalizeDateOnly(els.recordDateInput.value),note:els.recordNoteInput.value.trim().slice(0,120),createdAt:new Date().toISOString()};await mutateState(n=>{n.shinyRecords=[...n.shinyRecords,record]},'已加入纪念册');els.recordNoteInput.value='';setRecordStatus('已保存。');setTimeout(()=>setRecordStatus(''),1800)}
function deleteRecord(id){const r=state.shinyRecords.find(x=>x.id===id);if(!r)return;const p=petMap.get(r.petId),label=p?p.name:'该记录';if(!confirm(`确定要删除【${label}】的异色收录记录吗？`))return;mutateState(n=>{n.shinyRecords=n.shinyRecords.filter(x=>x.id!==id)},'已删除记录')}
function getSolarTermSlug(date=new Date()){const terms=[['xiaohan',1,5],['dahan',1,20],['lichun',2,4],['yushui',2,19],['jingzhe',3,5],['chunfen',3,20],['qingming',4,4],['guyu',4,20],['lixia',5,5],['xiaoman',5,21],['mangzhong',6,5],['xiazhi',6,21],['xiaoshu',7,7],['dashu',7,22],['liqiu',8,7],['chushu',8,23],['bailu',9,7],['qiufen',9,23],['hanlu',10,8],['shuangjiang',10,23],['lidong',11,7],['xiaoxue',11,22],['daxue',12,7],['dongzhi',12,22]];const m=date.getMonth()+1,d=date.getDate();let cur='dongzhi';for(const[t,mm,dd]of terms)if(m>mm||m===mm&&d>=dd)cur=t;return cur}function applySeasonalBackground(){document.documentElement.style.setProperty('--seasonal-bg',`url("pic/background/${getSolarTermSlug()}.jpg")`);refreshPageBackgroundHeight()}function refreshPageBackgroundHeight(){requestAnimationFrame(()=>{const h=Math.max(document.documentElement.scrollHeight,document.body.scrollHeight,innerHeight);document.documentElement.style.setProperty('--page-bg-height',`${h}px`)})}
async function ensureUserDocument(){if(!userDocRef||!currentUser)return;const snap=await getDoc(userDocRef);if(!snap.exists()){const d=createDefaultState();await setDoc(userDocRef,{user_id:currentUser.uid,...d,createdAt:serverTimestamp(),updatedAt:serverTimestamp()},{merge:true})}}function subscribeUserData(){if(!userDocRef)return;if(unsubscribeUserDoc)unsubscribeUserDoc();setSyncStatus('连接中','saving');unsubscribeUserDoc=onSnapshot(userDocRef,snap=>{state=normalizeState(snap.exists()?snap.data():{});render();setSyncStatus(snap.metadata.hasPendingWrites?'保存中':'已同步',snap.metadata.hasPendingWrites?'saving':'ok')},e=>{console.error(e);setSyncStatus('监听失败','error');showToast(`无法监听数据变化：${e.code||e.message||'未知错误'}`)})}
function showApp(user){currentUser=user;userDocRef=doc(db,'users',user.uid);els.userEmailText.textContent=user.email||user.uid;document.body.classList.remove('is-auth');document.body.classList.add('is-app');els.authScreen.classList.add('is-hidden');els.appScreen.classList.remove('is-hidden');applySeasonalBackground();ensureUserDocument().catch(e=>{console.error(e);setSyncStatus('初始化失败','error');showToast(`初始化失败：${e.code||e.message||'未知错误'}`)}).finally(subscribeUserData);startResizeObserver()}function showAuth(){currentUser=null;userDocRef=null;state=createDefaultState();if(unsubscribeUserDoc)unsubscribeUserDoc();unsubscribeUserDoc=null;document.body.classList.remove('is-app');document.body.classList.add('is-auth');els.appScreen.classList.add('is-hidden');els.authScreen.classList.remove('is-hidden');setAuthStatus('');stopResizeObserver();refreshPageBackgroundHeight()}function startResizeObserver(){stopResizeObserver();if('ResizeObserver'in window){pageResizeObserver=new ResizeObserver(refreshPageBackgroundHeight);pageResizeObserver.observe(document.body)}addEventListener('resize',refreshPageBackgroundHeight)}function stopResizeObserver(){if(pageResizeObserver)pageResizeObserver.disconnect();pageResizeObserver=null;removeEventListener('resize',refreshPageBackgroundHeight)}
function mapAuthError(e){const c=e?.code||'',m={'auth/invalid-email':'邮箱格式不正确。','auth/user-disabled':'该账号已被停用。','auth/user-not-found':'账号不存在，请先注册。','auth/wrong-password':'密码不正确。','auth/invalid-credential':'邮箱或密码不正确。','auth/email-already-in-use':'该邮箱已注册，请直接登录。','auth/weak-password':'密码强度不足，请至少使用 6 位。','auth/configuration-not-found':'Firebase Auth 尚未正确配置，请检查项目配置并启用 Email/Password。','auth/unauthorized-domain':'当前域名未加入 Firebase Authentication 授权域名。'};return m[c]||`操作失败：${c||e?.message||'未知错误'}`}
function bindEvents(){els.modeButtons.forEach(btn=>btn.addEventListener('click',()=>{authMode=btn.dataset.authMode==='register'?'register':'login';els.modeButtons.forEach(x=>x.classList.toggle('is-active',x===btn));els.authHeading.textContent=authMode==='login'?'登录账号':'注册账号';els.authSubmit.textContent=authMode==='login'?'登录':'注册';els.passwordInput.autocomplete=authMode==='login'?'current-password':'new-password';setAuthStatus('')}));els.authForm.addEventListener('submit',async e=>{e.preventDefault();const email=els.emailInput.value.trim(),password=els.passwordInput.value;if(!email||!password)return;els.authSubmit.disabled=true;setAuthStatus(authMode==='login'?'正在登录...':'正在注册...');try{if(authMode==='login')await signInWithEmailAndPassword(auth,email,password);else await createUserWithEmailAndPassword(auth,email,password)}catch(err){console.error(err);setAuthStatus(mapAuthError(err),true)}finally{els.authSubmit.disabled=false}});els.logoutButton.addEventListener('click',()=>signOut(auth));document.querySelectorAll('[data-scroll-target]').forEach(btn=>btn.addEventListener('click',()=>document.getElementById(btn.dataset.scrollTarget)?.scrollIntoView({behavior:'smooth',block:'start'})));document.addEventListener('click',e=>{const action=e.target.closest('[data-action]');if(action){const card=action.closest('[data-scope][data-key]');if(card)handlePoolAction(card,action.dataset.action);return}const st=e.target.closest('[data-toggle-season]');if(st){const p=st.closest('.season-panel'),expanded=p.classList.toggle('is-collapsed')===false;st.setAttribute('aria-expanded',String(expanded));refreshPageBackgroundHeight();return}const rt=e.target.closest('[data-toggle-record-season]');if(rt){const g=rt.closest('.record-season'),expanded=g.classList.toggle('is-collapsed')===false;rt.setAttribute('aria-expanded',String(expanded));refreshPageBackgroundHeight();return}const del=e.target.closest('[data-delete-record]');if(del)deleteRecord(del.dataset.deleteRecord)});els.seasonFilter.addEventListener('change',applySeasonFilter);els.recordSeasonSelect.addEventListener('change',updateRecordPetOptions);els.recordForm.addEventListener('submit',addRecord);addEventListener('load',refreshPageBackgroundHeight)}
buildStaticUI();bindEvents();applySeasonalBackground();onAuthStateChanged(auth,user=>user?showApp(user):showAuth());
</script>
