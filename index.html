<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f6fbff" />
  <title>洛克王国异色精灵保底进度</title>
  <style>
    :root {
      --bg: #f6f9fc;
      --surface: rgba(255, 255, 255, .78);
      --surface-strong: rgba(255, 255, 255, .92);
      --text: #142033;
      --muted: #69768a;
      --subtle: #93a2b7;
      --line: rgba(116, 135, 160, .22);
      --primary: #27b89b;
      --primary-2: #4bc2ff;
      --primary-3: #99abf7;
      --danger: #ee4f66;
      --danger-2: #c82d4a;
      --ink-on-dark: #f8efe0;
      --shadow: 0 26px 80px rgba(31, 46, 70, .13);
      --shadow-soft: 0 14px 40px rgba(31, 46, 70, .09);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --container: 1320px;
      --ease: cubic-bezier(.2, .8, .2, 1);
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at 10% 8%, rgba(75, 194, 255, .20), transparent 30%),
        radial-gradient(circle at 86% 6%, rgba(39, 184, 155, .18), transparent 28%),
        radial-gradient(circle at 56% 96%, rgba(153, 171, 247, .18), transparent 34%),
        linear-gradient(135deg, #f8fbff 0%, #eff9f6 48%, #f8f7ff 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(20, 32, 51, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(20, 32, 51, .035) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.75), transparent 78%);
    }

    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }
    button:disabled, input:disabled, select:disabled, textarea:disabled { cursor: not-allowed; opacity: .55; }
    img { max-width: 100%; display: block; }

    .is-hidden { display: none !important; }
    .screen { position: relative; z-index: 1; min-height: 100vh; }

    .auth-screen {
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 18px;
      padding: 24px;
      align-items: center;
    }

    .auth-shell {
      width: min(100%, 1040px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(360px, .95fr);
      gap: 22px;
      align-items: stretch;
    }

    .glass,
    .brand-panel,
    .auth-card,
    .topbar,
    .hero,
    .pool-section,
    .count-card,
    .season-panel,
    .record-card,
    .record-form {
      border: 1px solid var(--line);
      background: var(--surface);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow: var(--shadow-soft);
    }

    .brand-panel {
      position: relative;
      min-height: 590px;
      overflow: hidden;
      border-radius: var(--radius-xl);
      padding: clamp(28px, 4vw, 48px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .brand-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(75, 194, 255, .24), transparent 34%),
        radial-gradient(circle at 92% 94%, rgba(39, 184, 155, .30), transparent 30%);
      pointer-events: none;
    }

    .brand-panel::after {
      content: "";
      position: absolute;
      right: -120px;
      bottom: -145px;
      width: 390px;
      height: 390px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(39, 184, 155, .48), rgba(75, 194, 255, .34));
      filter: blur(3px);
      opacity: .92;
    }

    .brand-content, .brand-meta { position: relative; z-index: 1; }

    .brand-mark,
    .mini-logo {
      display: grid;
      place-items: center;
      color: white;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 18px 44px rgba(39, 184, 155, .28);
    }

    .brand-mark {
      width: 62px;
      height: 62px;
      border-radius: 20px;
      font-size: 30px;
    }

    .brand-title {
      margin: 28px 0 16px;
      font-size: clamp(38px, 5.2vw, 64px);
      line-height: 1.04;
      letter-spacing: -.065em;
    }

    .brand-title span { color: #158c7d; }

    .brand-text {
      max-width: 510px;
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.75;
    }

    .brand-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 30px;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 13px;
      border-radius: 999px;
      background: rgba(255,255,255,.68);
      border: 1px solid rgba(148,163,184,.22);
      color: #334155;
      font-size: 13px;
      font-weight: 750;
    }

    .dot {
      width: 9px;
      height: 9px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--primary);
      box-shadow: 0 0 0 5px rgba(39, 184, 155, .14);
    }

    .auth-card {
      border-radius: var(--radius-xl);
      padding: clamp(24px, 3vw, 38px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: rgba(255,255,255,.86);
    }

    .auth-card h2 {
      margin: 0 0 8px;
      font-size: 32px;
      letter-spacing: -.045em;
    }

    .auth-card p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.65;
    }

    .mode-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 6px;
      margin-bottom: 20px;
      border-radius: 18px;
      background: rgba(226,232,240,.72);
    }

    .mode-button {
      min-height: 42px;
      border-radius: 14px;
      color: #64748b;
      font-weight: 850;
      background: transparent;
      transition: all .22s var(--ease);
    }

    .mode-button.is-active {
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 12px 26px rgba(39,184,155,.22);
    }

    .field-group { display: grid; gap: 8px; margin-bottom: 14px; }
    .field-group label { color: #334155; font-size: 13px; font-weight: 850; }

    .field-group input,
    .field-group select,
    .field-group textarea {
      width: 100%;
      min-height: 48px;
      border: 1px solid rgba(148,163,184,.34);
      border-radius: 15px;
      outline: none;
      padding: 0 14px;
      color: var(--text);
      background: rgba(255,255,255,.78);
      transition: border-color .2s var(--ease), box-shadow .2s var(--ease), background .2s var(--ease);
    }

    .field-group textarea { min-height: 92px; resize: vertical; padding-top: 12px; line-height: 1.55; }

    .field-group input:focus,
    .field-group select:focus,
    .field-group textarea:focus {
      border-color: rgba(39,184,155,.62);
      background: white;
      box-shadow: 0 0 0 4px rgba(39,184,155,.13);
    }

    .primary-button,
    .ghost-button,
    .action-button,
    .nav-link,
    .compact-button {
      border-radius: 15px;
      font-weight: 900;
      transition: transform .18s var(--ease), box-shadow .18s var(--ease), background .18s var(--ease), opacity .18s var(--ease);
    }

    .primary-button {
      width: 100%;
      min-height: 50px;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 18px 34px rgba(39,184,155,.25);
    }

    .primary-button:hover, .action-button:hover, .ghost-button:hover, .nav-link:hover, .compact-button:hover { transform: translateY(-1px); }

    .auth-error {
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px solid rgba(238,79,102,.24);
      border-radius: 15px;
      color: #9f1239;
      background: rgba(255, 241, 242, .86);
      line-height: 1.55;
      font-size: 14px;
    }

    .site-footer {
      position: relative;
      z-index: 1;
      width: 100%;
      padding: 10px 4px 4px;
      text-align: center;
      color: var(--subtle);
      font-size: 12px;
      letter-spacing: .02em;
    }

    .app-screen {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 18px;
    }

    .topbar-wrap {
      position: sticky;
      top: 14px;
      z-index: 20;
      width: min(100%, var(--container));
      margin: 0 auto;
    }

    .topbar {
      border-radius: 24px;
      padding: 12px;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto;
      gap: 12px;
      align-items: center;
      background: rgba(255,255,255,.78);
    }

    .top-left { min-width: 0; display: flex; align-items: center; gap: 12px; }

    .mini-logo {
      width: 44px;
      height: 44px;
      border-radius: 15px;
      font-size: 20px;
      flex: 0 0 auto;
    }

    .app-name {
      margin: 0;
      font-size: 18px;
      letter-spacing: -.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-email {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 360px;
    }

    .top-nav {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px;
      border-radius: 18px;
      background: rgba(226,232,240,.52);
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 12px;
      color: #475569;
      text-decoration: none;
      font-size: 13px;
      background: transparent;
    }

    .nav-link:hover { color: #0f766e; background: rgba(255,255,255,.78); box-shadow: 0 8px 20px rgba(31,46,70,.08); }

    .top-actions { display: flex; align-items: center; justify-content: flex-end; gap: 10px; }

    .sync-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 36px;
      padding: 0 12px;
      border-radius: 999px;
      color: #0f766e;
      background: rgba(236, 253, 245, .9);
      border: 1px solid rgba(20,184,166,.18);
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .sync-badge::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 0 4px rgba(16,185,129,.12);
    }

    .sync-badge.is-saving { color: #9a5b00; background: rgba(255,251,235,.94); border-color: rgba(245,158,11,.20); }
    .sync-badge.is-saving::before { background: #f59e0b; }
    .sync-badge.is-error { color: #be123c; background: rgba(255,241,242,.94); border-color: rgba(238,79,102,.22); }
    .sync-badge.is-error::before { background: var(--danger); }

    .ghost-button {
      min-height: 36px;
      padding: 0 13px;
      color: #475569;
      background: rgba(255,255,255,.75);
      border: 1px solid rgba(148,163,184,.26);
      white-space: nowrap;
    }

    .ghost-button:hover { color: #0f172a; background: white; box-shadow: 0 10px 26px rgba(31,46,70,.08); }

    .container {
      flex: 1;
      width: min(100%, var(--container));
      margin: 18px auto 0;
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-xl);
      padding: clamp(22px, 4vw, 36px);
      background:
        linear-gradient(135deg, rgba(255,255,255,.86), rgba(255,255,255,.62)),
        radial-gradient(circle at 96% 10%, rgba(75,194,255,.28), transparent 32%),
        radial-gradient(circle at 20% 95%, rgba(39,184,155,.24), transparent 28%);
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -95px;
      top: -110px;
      width: 320px;
      height: 320px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(75,194,255,.30), rgba(153,171,247,.22));
      filter: blur(3px);
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 420px);
      gap: 22px;
      align-items: end;
    }

    .eyebrow { display: inline-flex; align-items: center; gap: 10px; color: #0f766e; font-size: 13px; font-weight: 950; letter-spacing: .08em; text-transform: uppercase; }
    .hero h1 { margin: 13px 0 10px; max-width: 760px; font-size: clamp(34px, 4.7vw, 62px); line-height: 1.06; letter-spacing: -.065em; }
    .hero p { max-width: 680px; margin: 0; color: var(--muted); line-height: 1.75; font-size: 15px; }

    .stats-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }

    .stat-card {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(148,163,184,.22);
      border-radius: 22px;
      padding: 16px;
      background: rgba(255,255,255,.78);
      box-shadow: 0 12px 30px rgba(31,46,70,.07);
    }

    .stat-card::after {
      content: "";
      position: absolute;
      right: -34px;
      bottom: -42px;
      width: 110px;
      height: 110px;
      border-radius: 999px;
      background: rgba(39,184,155,.12);
    }

    .stat-label { position: relative; z-index: 1; display: block; color: var(--muted); font-size: 12px; font-weight: 900; }
    .stat-value { position: relative; z-index: 1; display: block; margin-top: 6px; color: #0f172a; font-size: 34px; font-weight: 950; letter-spacing: -.04em; }

    .pool-section {
      border-radius: var(--radius-xl);
      padding: clamp(16px, 2.6vw, 24px);
      background: rgba(255,255,255,.70);
      scroll-margin-top: 110px;
    }

    .section-header { display: flex; align-items: flex-end; justify-content: space-between; gap: 14px; margin-bottom: 16px; }
    .section-header h2 { margin: 0; font-size: clamp(22px, 2.4vw, 30px); letter-spacing: -.04em; }
    .section-header p { margin: 7px 0 0; color: var(--muted); line-height: 1.65; font-size: 14px; }

    .section-actions { display: flex; align-items: center; flex-wrap: wrap; justify-content: flex-end; gap: 10px; }

    .section-count,
    .select-wrap,
    .compact-button {
      min-height: 38px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,.24);
      background: rgba(255,255,255,.76);
      color: #475569;
      font-size: 13px;
      font-weight: 900;
    }

    .section-count { display: inline-flex; align-items: center; white-space: nowrap; padding: 0 13px; }
    .select-wrap { position: relative; overflow: hidden; padding: 0 12px; display: inline-flex; align-items: center; }
    .select-wrap select { width: 180px; border: 0; outline: none; background: transparent; color: #334155; font-weight: 900; min-height: 36px; cursor: pointer; }
    .compact-button { padding: 0 13px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
    .type-grid { grid-template-columns: repeat(auto-fit, minmax(156px, 1fr)); }
    .world-grid { grid-template-columns: minmax(0, 1fr); }

    .count-card {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      padding: 15px;
      background: rgba(255,255,255,.82);
      transition: transform .22s var(--ease), box-shadow .22s var(--ease), border-color .22s var(--ease);
    }

    .count-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: rgba(39,184,155,.24); }

    .count-card.world-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(220px, 320px);
      gap: 18px;
      align-items: center;
      padding: clamp(20px, 3vw, 28px);
      background:
        radial-gradient(circle at 95% 10%, rgba(75,194,255,.22), transparent 34%),
        linear-gradient(135deg, rgba(255,255,255,.90), rgba(255,255,255,.70));
    }

    .world-visual {
      width: 76px;
      height: 76px;
      border-radius: 26px;
      display: grid;
      place-items: center;
      color: white;
      font-size: 32px;
      font-weight: 950;
      background: linear-gradient(135deg, #172033, #27b89b 54%, #4bc2ff);
      box-shadow: 0 20px 46px rgba(39,184,155,.26);
    }

    .world-main { display: flex; align-items: center; gap: 16px; min-width: 0; }
    .card-kicker { display: block; color: var(--muted); font-size: 12px; font-weight: 900; }
    .card-title { margin: 4px 0 0; color: var(--text); font-size: 18px; font-weight: 950; letter-spacing: -.025em; }
    .count-number { margin-top: 11px; color: #111827; font-size: 42px; font-weight: 950; line-height: .98; letter-spacing: -.055em; }

    .actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 14px; }
    .world-card .actions { margin-top: 0; grid-template-columns: 1fr; }

    .action-button { min-height: 38px; padding: 0 10px; color: #334155; background: rgba(241,245,249,.86); }
    .action-button:hover { color: #0f172a; background: white; box-shadow: 0 10px 24px rgba(31,46,70,.08); }
    .action-button.plus { color: white; background: linear-gradient(135deg, var(--primary), var(--primary-2)); box-shadow: 0 12px 28px rgba(39,184,155,.18); }
    .action-button.minus { color: #2563eb; }
    .action-button.clear { color: #be123c; background: rgba(255,241,242,.88); }
    .action-button.clear:hover { color: white; background: linear-gradient(135deg, var(--danger), var(--danger-2)); }

    .type-card {
      color: var(--ink-on-dark);
      border-color: rgba(255,255,255,.30);
      background:
        radial-gradient(circle at 14% 12%, rgba(255,255,255,.36), transparent 26%),
        radial-gradient(circle at 94% 8%, rgba(255,255,255,.22), transparent 34%),
        linear-gradient(135deg, rgba(var(--type-rgb), .98), rgba(var(--type-rgb), .70));
      box-shadow: 0 18px 44px rgba(var(--type-rgb), .22), 0 10px 24px rgba(31,46,70,.08);
    }

    .type-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.18), transparent 36%), linear-gradient(to bottom, transparent, rgba(0,0,0,.16));
      pointer-events: none;
    }

    .type-card::after {
      content: "";
      position: absolute;
      right: -36px;
      bottom: -36px;
      width: 118px;
      height: 118px;
      border: 1px solid rgba(248,239,224,.24);
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      pointer-events: none;
    }

    .type-card > * { position: relative; z-index: 1; }
    .type-card .card-title, .type-card .count-number { color: #f8efe0; text-shadow: 0 2px 16px rgba(0,0,0,.20); }
    .type-card .card-kicker { color: rgba(248,239,224,.78); }
    .type-card .actions .action-button { color: rgba(248,239,224,.92); background: rgba(255,255,255,.16); border: 1px solid rgba(248,239,224,.20); backdrop-filter: blur(10px); }
    .type-card .actions .action-button:hover { color: #172033; background: rgba(255,255,255,.88); }
    .type-card .actions .plus { color: #172033; background: rgba(255,255,255,.92); box-shadow: 0 12px 28px rgba(0,0,0,.10); }
    .type-card .actions .clear:hover { color: white; background: rgba(190,18,60,.86); }

    .pet-card { display: grid; gap: 12px; }

    .pet-art {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 20px;
      background:
        radial-gradient(circle at 26% 18%, rgba(255,255,255,.90), transparent 26%),
        radial-gradient(circle at 80% 76%, rgba(75,194,255,.20), transparent 30%),
        linear-gradient(145deg, rgba(39,184,155,.16), rgba(153,171,247,.18));
      border: 1px solid rgba(148,163,184,.20);
    }

    .pet-art::before {
      content: "";
      position: absolute;
      inset: 10%;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,255,255,.72), transparent 64%);
      filter: blur(12px);
      opacity: .85;
    }

    .pet-art::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, rgba(255,255,255,.24), transparent 38%), linear-gradient(to top, rgba(12,18,32,.08), transparent 38%);
      pointer-events: none;
    }

    .pet-art img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 7%;
      filter: drop-shadow(0 14px 22px rgba(31,46,70,.18));
    }

    .pet-topline { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .type-tags { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; min-height: 24px; justify-content: flex-end; }

    .type-tag {
      --tag-rgb: 39,184,155;
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      color: #f8efe0;
      background: linear-gradient(135deg, rgba(var(--tag-rgb), .95), rgba(var(--tag-rgb), .68));
      box-shadow: 0 8px 18px rgba(var(--tag-rgb), .18);
      font-size: 11px;
      font-weight: 950;
